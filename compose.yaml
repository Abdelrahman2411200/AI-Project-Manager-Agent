name: ai-project-manager

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: project_manager
      POSTGRES_USER: project_manager
      POSTGRES_PASSWORD: project_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U project_manager -d project_manager
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      target: development
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://project_manager:project_manager@db:5432/project_manager
      CORS_ORIGINS: '["http://localhost:5173"]'
      SESSION_HASH_SECRET: development-compose-session-secret-change-me
      COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=2)
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      target: development
    command:
      - uv
      - run
      - python
      - -m
      - app.workers.main
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://project_manager:project_manager@db:5432/project_manager
      SESSION_HASH_SECRET: development-compose-session-secret-change-me
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      target: development
    command:
      - uv
      - run
      - alembic
      - upgrade
      - head
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://project_manager:project_manager@db:5432/project_manager
      SESSION_HASH_SECRET: development-compose-session-secret-change-me
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
