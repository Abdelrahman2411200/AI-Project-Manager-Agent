<!-- STITCH_SHADER_START:ANIMATION_13 class="absolute inset-0 w-full h-full z-0" -->
<div class="absolute inset-0 w-full h-full z-0" style="display:block;">
<canvas id="shader-canvas-ANIMATION_13" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_13');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

varying vec2 v_texCoord;

// Simplex 2D noise
vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
float snoise(vec2 v){
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
           -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy) );
  vec2 x0 = v -   i + dot(i, C.xx);
  vec2 i1;
  i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod(i, 289.0);
  vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
  + i.x + vec3(0.0, i1.x, 1.0 ));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
    dot(x12.zw,x12.zw)), 0.0);
  m = m*m ;
  m = m*m ;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
  vec3 g;
  g.x  = a0.x  * x0.x  + h.x  * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

void main() {
    vec2 uv = v_texCoord;
    vec2 center = uv - 0.5;
    center.x *= u_resolution.x / u_resolution.y;
    
    // Background color: #f8f9ff (Cognitive Architecture Surface)
    vec3 backgroundColor = vec3(0.972, 0.976, 1.0);
    
    // Primary Cobalt: #3563e9
    vec3 primaryColor = vec3(0.208, 0.388, 0.914);
    
    // AI Accent Violet: #7357d8
    vec3 secondaryColor = vec3(0.451, 0.341, 0.847);

    // Create a flowing neural-like network pattern
    float n = snoise(uv * 3.0 + u_time * 0.05);
    float n2 = snoise(uv * 6.0 - u_time * 0.1);
    
    float network = smoothstep(0.45, 0.5, abs(n + n2 * 0.5));
    network *= 0.15; // Subtle opacity
    
    // Pulse effect
    float pulse = sin(u_time * 0.5) * 0.5 + 0.5;
    vec3 color = mix(backgroundColor, primaryColor, network * pulse);
    color = mix(color, secondaryColor, network * (1.0 - pulse) * 0.5);
    
    // Soft vignette
    float dist = length(center);
    color *= smoothstep(1.2, 0.2, dist);

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<!-- Centered Sign-In Form -->
<div class="w-full flex items-center justify-center p-md md:p-xl relative z-10">

</div>
</div>

<div>

<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface focus:outline-none h-6 w-6 flex items-center justify-center rounded" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>

<!-- Hover shine effect -->
<div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite] pointer-events-none"></div>
<span class="btn-text">Sign In</span>

</svg>
</div>
</button>

                By signing in, you agree to the <a class="text-on-surface hover:underline" href="#">Terms of Service</a> &amp; <a class="text-on-surface hover:underline" href="#">Privacy Policy</a>.
            </div>
</div>
</div>
<style>
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }

        function handleSignIn(event) {
            event.preventDefault(); // Prevent actual form submission for demo
            
            const btn = document.getElementById('submit-btn');
            
            // Add loading state
            btn.classList.add('loading-active');
            btn.disabled = true;
            btn.classList.add('opacity-90', 'cursor-not-allowed');

            // Simulate network request
            setTimeout(() => {
                // Remove loading state (in a real app, you'd redirect here)
                btn.classList.remove('loading-active');
                btn.disabled = false;
                btn.classList.remove('opacity-90', 'cursor-not-allowed');
                
                // Optional: show a quick success state before redirect
                const btnText = btn.querySelector('.btn-text');
                btnText.textContent = 'Success';
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                
                setTimeout(() => {
                    btnText.textContent = 'Sign In';
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                }, 1500);

            }, 2000);
        }
    </script>
